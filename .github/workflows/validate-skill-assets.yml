name: Validate Skill Assets

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x install.sh scripts/validate-skill-assets.sh

      - name: Validate skill assets
        run: ./scripts/validate-skill-assets.sh
